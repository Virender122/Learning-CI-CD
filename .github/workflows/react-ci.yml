name: React CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4   # temporary node install on ubuntu
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      # - name: Run Tests
      #   run: npm test -- --watchAll=false

      - name: Build Project
        run: npm run build